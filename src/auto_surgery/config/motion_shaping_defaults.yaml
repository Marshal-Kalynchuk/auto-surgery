  max_linear_m_s: 0.045
  max_angular_rad_s: 1.20
  max_linear_accel_m_s2: 0.080
  max_angular_accel_rad_s2: 2.20
  bias_gain_max: 0.75
  bias_ramp_distance_m: 0.020
  orientation_bias_gain: 0.45
  orientation_deadband_rad: 0.100

