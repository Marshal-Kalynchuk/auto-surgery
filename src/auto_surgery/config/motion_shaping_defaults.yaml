## Scene-specific defaults for MotionShaping.
## Used as a starting point for sectioned rollout and per-scene tuning.
##
## Keys are scene IDs from registry entries:
## - IMPLEMENTED_SCENE_REGISTRY: "dejavu_brain"
## - PLANNED_SCENE_REGISTRY: "dejavu_liver", "dejavu_kidney", "dejavu_eye",
##                            "dejavu_uterus", "lapgym"

