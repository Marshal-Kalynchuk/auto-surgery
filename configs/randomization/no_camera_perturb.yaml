tissue_material:
  young_modulus_pa:
    low: 1000.0
    high: 10000.0
  poisson_ratio:
    low: 0.35
    high: 0.48
  total_mass_kg:
    low: 0.3
    high: 0.7
  rayleigh_stiffness:
    low: 0.05
    high: 0.2

tissue_topology:
  sparse_grid_n:
    options:
      - [12, 12, 12]
      - [16, 16, 16]
      - [20, 20, 20]
    weights:
      - 1.0
      - 2.0
      - 1.0

tissue_mesh:
  # Brain volume, cortex surface, and skull must stay registered. Pin scale and
  # bulge to identity so the tissue mesh is rendered in its canonical pose every
  # episode; the skull MeshOBJLoader (static, hard-coded transform) then stays
  # aligned with the FEM brain.
  scale_x:
    low: 1.0
    high: 1.0
  scale_y:
    low: 1.0
    high: 1.0
  scale_z:
    low: 1.0
    high: 1.0
  translation_scene:
    x:
      low: 0.0
      high: 0.0
    y:
      low: 0.0
      high: 0.0
    z:
      low: 0.0
      high: 0.0
  bulge_probability: 0.0
  bulge_offset_within_volume_frac:
    x:
      low: -0.8
      high: 0.8
    y:
      low: -0.8
      high: 0.8
    z:
      low: -0.8
      high: 0.8
  bulge_radius_scene:
