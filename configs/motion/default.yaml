## Motion generator knobs (tuning surface)
## - seed: RNG seed for deterministic primitive sampling.
## - primitive_count_min/max: number of primitives per episode.
## - weight_*: relative probability of selecting each primitive (names match
##     PrimitiveKind in src/auto_surgery/motion/primitives.py).
## - *_duration_range_s / *_angle_range_rad / *_distance_range_mm:
##     per-primitive parameter ranges (scene millimetres, seconds, radians).
## - target_orientation_jitter_rad: orientation noise on Reach / ContactReach targets.
## Legacy YAML keys (weight_approach, approach_duration_range_s, etc.) are still
## accepted at load time and mapped onto these canonical fields.
## Optional motion_shaping (see motion_shaping_defaults.yaml): speed/accel caps for
## pose-servo. When omitted here, recording applies per-scene defaults from that file.
## DEPRECATED there: bias_*, orientation_* (YAML back-compat only).
## frustum_margin_mm: null reserves a future FOV hook.
seed: 0
primitive_count_min: 8
primitive_count_max: 20
weight_reach: 1.0
weight_hold: 0.5
weight_drag: 0.7
weight_brush: 0.9
weight_grip: 0.9
weight_contact_reach: 0.8
reach_duration_range_s:
  - 0.6
  - 1.5
hold_duration_range_s:
  - 0.3
  - 0.8
drag_duration_range_s:
  - 0.4
  - 0.9
drag_distance_range_mm:
  - 3.0
  - 12.0
brush_duration_range_s:
  - 0.6
  - 1.4
brush_arc_range_rad:
  - 0.3
  - 1.2
rotate_duration_range_s:
  - 0.4
  - 1.0
rotate_angle_range_rad:
  - 0.5
  - 1.5
probe_duration_range_s:
  - 0.6
  - 1.4
probe_hold_range_s:
  - 0.15
  - 0.45
target_orientation_jitter_rad: 0.26
jaw_value_range:
  - 0.0
  - 1.0
jaw_change_probability: 0.4
